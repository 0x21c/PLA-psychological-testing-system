        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {

            background: linear-gradient(135deg, #e0e5ec 0%, #c8d6e5 100%);

        }

        .header {
            background: linear-gradient(180deg, #0066cc 0%, #004499 100%);
            padding: 20px 40px;
            display: flex;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        .flag {
            width: 120px;
            height: 80px;
            margin-right: 30px;
            border-radius: 8px;
            box-shadow: 2px 2px 8px rgba(0, 0, 0, 0.3);
        }

        .header h1 {
            font-size: 36px;
            color: #ffcc00;
            text-shadow: 3px 3px 0 #996600, -1px -1px 0 #996600;
            font-weight: bold;
            letter-spacing: 4px;
            flex: 1;
        }

        .language-switch {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        .lang-toggle {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
            min-width: 80px;
        }

        .lang-toggle:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .language-dropdown {
            position: absolute;
            top: 100%;
            right: 0;
            margin-top: 8px;
            background: rgba(0, 68, 153, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 6px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            display: none;
            flex-direction: column;
            z-index: 100;
            min-width: 120px;
        }

        .language-dropdown.show {
            display: flex;
        }

        .lang-option {
            background: transparent;
            border: none;
            color: white;
            padding: 10px 20px;
            cursor: pointer;
            font-size: 14px;
            text-align: left;
            transition: all 0.2s ease;
        }

        .lang-option:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .lang-option.active {
            background: rgba(255, 255, 255, 0.2);
            color: #ffcc00;
            font-weight: bold;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: calc(100vh - 120px);
            padding: 40px 20px;
        }

        .badge {
            background: rgba(0, 102, 204, 0.15);
            border: 1px solid rgba(0, 102, 204, 0.3);
            color: #0066cc;
            padding: 8px 24px;
            border-radius: 20px;
            font-size: 14px;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 42px;
            color: #0066cc;
            font-weight: 700;
            margin-bottom: 20px;
            text-align: center;
            letter-spacing: 6px;
        }

        .subtitle {
            font-size: 18px;
            color: #666;
            margin-bottom: 40px;
            text-align: center;
        }

        .description {
            font-size: 16px;
            color: #555;
            line-height: 1.8;
            max-width: 800px;
            text-align: center;
            margin-bottom: 50px;
            background: rgba(255, 255, 255, 0.8);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }

        .start-btn {
            background: linear-gradient(135deg, #0066cc 0%, #004499 100%);
            color: white;
            border: none;
            padding: 16px 60px;
            font-size: 20px;
            font-weight: 600;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 6px 25px rgba(0, 102, 204, 0.4);
            margin-bottom: 60px;
        }

        .start-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 35px rgba(0, 102, 204, 0.5);
        }

        .features {
            display: flex;
            gap: 60px;
            margin-bottom: 60px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .feature-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            min-width: 120px;
        }

        .feature-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #0066cc 0%, #004499 100%);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
            box-shadow: 0 4px 15px rgba(0, 102, 204, 0.3);
        }

        .feature-text {
            font-size: 14px;
            color: #666;
            text-align: center;
        }

        .footer {
            text-align: center;
            padding: 30px 0;
            color: #888;
            font-size: 13px;
            background: rgba(0, 68, 153, 0.1);
        }

        .footer-links {
            margin-bottom: 10px;
        }

        .footer-links a {
            color: #0066cc;
            text-decoration: none;
            margin: 0 15px;
        }

        .footer-links a:hover {

        }

        @media (max-width: 768px) {
            .header {
                flex-direction: row;
                padding: 10px 15px;
                justify-content: center;
            }

            .flag {
                display: none;
            }

            .header h1 {
                font-size: 18px;
                text-align: center;
                letter-spacing: 2px;
            }

            h1 {
                font-size: 28px;
                letter-spacing: 4px;
            }

            .subtitle {
                font-size: 16px;
            }

            .description {
                font-size: 14px;
                padding: 20px;
                margin: 20px 10px 40px;
            }

            .start-btn {
                padding: 14px 40px;
                font-size: 18px;
            }

            .features {
                gap: 30px;
            }

            .feature-item {
                min-width: 100px;
            }

            .feature-icon {
                width: 40px;
                height: 40px;
                font-size: 20px;
            }

            .language-switch {
                position: absolute;
                top: 10px;
                right: 10px;
            }
        }
    </style>
</head>

            }
        };

        function toggleLanguageMenu() {
            const dropdown = document.getElementById('languageDropdown');
            dropdown.classList.toggle('show');
        }

        function selectLanguage(lang) {
            currentLang = lang;
            updateContent();
            const dropdown = document.getElementById('languageDropdown');
            dropdown.classList.remove('show');

            const langNames = {
                'zh': '中文',
                'en': 'English',
                'zh-tw': '繁體'
            };
            document.getElementById('langToggle').textContent = langNames[lang];

            const options = document.querySelectorAll('.lang-option');
            options.forEach(opt => opt.classList.remove('active'));
            document.getElementById(`lang-${lang}`).classList.add('active');
        }

        function updateContent() {
            const langData = translations[currentLang];
            Object.keys(langData).forEach(key => {
                const element = document.getElementById(key);
                if (element) {
                    element.textContent = langData[key];
                }
            });
        }

        function startTest() {
            window.location.href = `index.html?lang=${currentLang}`;
        }

        document.addEventListener('click', function(event) {
            const dropdown = document.getElementById('languageDropdown');
            const toggleBtn = document.getElementById('langToggle');
            if (dropdown && !dropdown.contains(event.target) && event.target !== toggleBtn) {
                dropdown.classList.remove('show');
            }
        });
